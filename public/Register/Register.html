<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - UE Club Portal</title>
    <link rel="stylesheet" href="Register.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        .email-row {
            display: flex;
            gap: 10px;
        }
        
        .small-btn {
            padding: 0 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.3s;
        }

        .small-btn:hover {
            background-color: #555;
        }

        .small-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        
        /* Style for the code input to look distinctive */
        #regOtp {
            text-align: center;
            letter-spacing: 4px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* CAPTCHA Styling */
        .g-recaptcha {
            display: flex;
            justify-content: center;
            margin: 15px 0 !important;
            transform: scale(1);
            transform-origin: center;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-box">
            <div class="form-header">
                <h2>Create Account</h2>
                <p>Join the UE Club Portal</p>
            </div>

            <form id="RegisterForm">
                
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Juan Dela Cruz" required>
                </div>

                <div class="input-group">
                    <label>UE Email Address</label>
                    <div class="email-row">
                        <input 
                            type="email" 
                            id="regEmail" 
                            placeholder="student@ue.edu.ph" 
                            pattern=".+@ue\.edu\.ph" 
                            title="Please use your official UE email address (ending in @ue.edu.ph)"
                            required
                        >
                        <button type="button" id="sendOtpBtn" class="small-btn">Send Code</button>
                    </div>
                </div>

                <div class="input-group" id="otpGroup" style="display: none;">
                    <label>Verification Code</label>
                    <input type="text" id="regOtp" placeholder="123456" maxlength="6">
                    <small style="color: #666; font-size: 0.8rem; display:block; margin-top:5px;">
                        Check your UE email for the 6-digit code.
                    </small>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Recommended atleast 8-12 characters" minlength="8" required>
                </div>

                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" id="regConfirmPassword" placeholder="Re-enter password" required>
                </div>
                <div class="input-group">
    <label>Account type</label>
    <select id="regRole" class="input-field" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; background:#fafafa;">
        <option value="Student">Student</option>
        <option value="Teacher">Teacher(non-adviser)</option>
    </select>
</div>

                <!-- Custom CAPTCHA Section -->
                <div style="background: #f8f9fa; padding: 15px; border-radius: 5px; margin: 15px 0; border: 1px solid #dee2e6;">
                    <p style="margin: 0 0 10px 0; font-size: 0.9rem; color: #495057;"><strong>Anti-Bot Verification:</strong> Type the characters shown below</p>
                    <canvas id="captchaCanvas" width="280" height="80" style="border: 1px solid #ccc; background: white; display: block; margin: 0 auto 10px; border-radius: 4px;"></canvas>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="captchaInput" placeholder="Enter the characters" style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ddd; background: #fafafa;" required>
                        <button type="button" id="refreshCaptcha" style="padding: 10px 15px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; min-width: 80px;">↻ Refresh</button>
                    </div>
                </div>

                <button type="submit" class="register-btn">Sign Up</button>
                
                <p class="login-link">
                    Already have an account? <a href="/Login/Login.html">Log In</a>
                </p>
            </form>
        </div>
    </div>

    <script src="Register.js"></script>
</body>
</html>
