name: Deploy Warrior Den
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sync PR Folder via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ 72.61.120.207 }}
          username: ${{ root }}
          password: ${{7I@srA,Az8qPRP7I@srA,Az8qPRP}}
          script: |
            cd ~/PR
            git fetch --all
            git reset --hard origin/main
            npm install
            pm2 delete all || true
            pm2 start server.js --name "warrior-den"